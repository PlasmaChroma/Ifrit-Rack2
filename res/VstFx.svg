<svg xmlns="http://www.w3.org/2000/svg" width="150" height="380" viewBox="0 0 150 380">
  <defs>
    <!-- Dark glassmorphic background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c0f12" />
      <stop offset="100%" stop-color="#141a20" />
    </linearGradient>
    
    <!-- Cyberpunk neon cyan glow -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00ffcc" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#005544" stop-opacity="0.1" />
    </linearGradient>
  </defs>

  <!-- Background panel -->
  <rect width="150" height="380" rx="0" fill="url(#bgGrad)" />
  
  <!-- Subtle border highlight -->
  <rect x="0.5" y="0.5" width="149" height="379" rx="0" fill="none" stroke="url(#borderGrad)" stroke-width="1" />

  <!-- Vertical design lines -->
  <line x1="8" y1="0" x2="8" y2="380" stroke="#00ffcc" stroke-opacity="0.08" stroke-dasharray="2,2" />
  <line x1="142" y1="0" x2="142" y2="380" stroke="#00ffcc" stroke-opacity="0.08" stroke-dasharray="2,2" />

  <!-- Static panel furniture. This is deliberately in the SVG so Rack's module
       browser preview reads as a complete module before dynamic widgets draw. -->
  <text x="75" y="13" font-family="sans-serif" font-size="7" font-weight="bold" fill="#d8fff7" text-anchor="middle" letter-spacing="2">VST FX</text>
  <rect x="10" y="20" width="130" height="38" rx="4" fill="#0f1419" stroke="#00ffcc" stroke-opacity=".22" />
  <text x="20" y="38" font-family="monospace" font-size="8" fill="#9eabb5">PLUGIN HOST</text>
  <path d="M121 39 C126 32,134 32,139 39 C134 46,126 46,121 39 Z" fill="none" stroke="#91a3b0" stroke-opacity=".55" />
  <circle cx="130" cy="39" r="3" fill="none" stroke="#91a3b0" stroke-opacity=".55" />
  <circle cx="75" cy="75" r="9" fill="#10171c" stroke="#00ffcc" stroke-opacity=".35" />
  <line x1="75" y1="68" x2="75" y2="76" stroke="#d8fff7" stroke-opacity=".5" stroke-width="1.5" />
  <line x1="14" y1="99" x2="136" y2="99" stroke="#00ffcc" stroke-opacity=".22" />
  <text x="25" y="99" font-family="monospace" font-size="5.5" fill="#6f858a" text-anchor="middle">CV</text>
  <text x="95" y="99" font-family="monospace" font-size="5.5" fill="#6f858a" text-anchor="middle">CV</text>
  <g fill="#0b1116" stroke="#00ffcc" stroke-opacity=".15">
    <rect x="12" y="102" width="56" height="22" rx="2"/><rect x="82" y="102" width="56" height="22" rx="2"/>
    <rect x="12" y="130" width="56" height="22" rx="2"/><rect x="82" y="130" width="56" height="22" rx="2"/>
    <rect x="12" y="158" width="56" height="22" rx="2"/><rect x="82" y="158" width="56" height="22" rx="2"/>
    <rect x="12" y="186" width="56" height="22" rx="2"/><rect x="82" y="186" width="56" height="22" rx="2"/>
    <rect x="12" y="214" width="56" height="22" rx="2"/><rect x="82" y="214" width="56" height="22" rx="2"/>
    <rect x="12" y="242" width="56" height="22" rx="2"/><rect x="82" y="242" width="56" height="22" rx="2"/>
    <rect x="12" y="270" width="56" height="22" rx="2"/><rect x="82" y="270" width="56" height="22" rx="2"/>
    <rect x="12" y="298" width="56" height="22" rx="2"/><rect x="82" y="298" width="56" height="22" rx="2"/>
  </g>
  <g fill="#547078" font-family="monospace" font-size="5.5" text-anchor="middle">
    <text x="45" y="120">P01</text><text x="115" y="120">P09</text><text x="45" y="148">P02</text><text x="115" y="148">P10</text>
    <text x="45" y="176">P03</text><text x="115" y="176">P11</text><text x="45" y="204">P04</text><text x="115" y="204">P12</text>
    <text x="45" y="232">P05</text><text x="115" y="232">P13</text><text x="45" y="260">P06</text><text x="115" y="260">P14</text>
    <text x="45" y="288">P07</text><text x="115" y="288">P15</text><text x="45" y="316">P08</text><text x="115" y="316">P16</text>
  </g>
  <line x1="14" y1="330" x2="136" y2="330" stroke="#00ffcc" stroke-opacity=".22" />
  <g fill="#10171c" stroke="#00ffcc" stroke-opacity=".22"><circle cx="25" cy="345" r="11"/><circle cx="55" cy="345" r="11"/><circle cx="95" cy="345" r="11"/><circle cx="125" cy="345" r="11"/></g>
  <g font-family="monospace" font-size="5.5" fill="#6f858a" text-anchor="middle"><text x="25" y="335">IN L</text><text x="55" y="335">IN R</text><text x="95" y="335">OUT L</text><text x="125" y="335">OUT R</text></g>

  <!-- Section Headers / Labels -->
  <text x="75" y="93" font-family="monospace" font-size="8" font-weight="bold" fill="#00ffcc" fill-opacity="0.7" text-anchor="middle" letter-spacing="1">BYPASS</text>
  
  <text x="75" y="367" font-family="monospace" font-size="7" font-weight="bold" fill="#00ffcc" fill-opacity="0.6" text-anchor="middle" letter-spacing="0.5">I / O  S T E R E O</text>
</svg>
